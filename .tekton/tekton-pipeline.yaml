# Tekton pipeline triggers definition — IBM Cloud reads this file from the repository.
# Docs: https://cloud.ibm.com/docs/ContinuousDelivery?topic=ContinuousDelivery-tekton-pipelines
---
apiVersion: tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: log-message-binding
spec:
  params:
    - name: message
      value: $(body.message)
    - name: image-name
      value: $(body.image_name)
    - name: cos-bucket
      value: $(body.cos_bucket)
    - name: cos-region
      value: $(body.cos_region)
    - name: ibmcloud-api-key
      value: $(body.ibmcloud_api_key)
    - name: cos-instance-crn
      value: $(body.cos_instance_crn)
    - name: ibmcloud-api-endpoint
      value: $(body.ibmcloud_api_endpoint)
    - name: cos-api-endpoint
      value: $(body.cos_api_endpoint)
    - name: packer-hcl-b64
      value: $(body.packer_hcl_b64)
    - name: packer-key-b64
      value: $(body.packer_key_b64)
---
apiVersion: tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: log-message-template
spec:
  params:
    - name: message
      description: The string message received from the webhook body
      default: ""
    - name: image-name
      description: Packer image name (with timestamp) from deploy.sh
      default: ""
    - name: cos-bucket
      description: COS bucket to store the run summary
      default: ""
    - name: cos-region
      description: COS region
      default: "us-south"
    - name: ibmcloud-api-key
      description: IBM Cloud API key for COS upload
      default: ""
    - name: cos-instance-crn
      description: CRN of the COS service instance
      default: ""
    - name: ibmcloud-api-endpoint
      description: IBM Cloud API endpoint (https://test.cloud.ibm.com for staging)
      default: "https://cloud.ibm.com"
    - name: cos-api-endpoint
      description: COS service endpoint (empty for production; set for staging)
      default: ""
    - name: packer-hcl-b64
      description: Base64-encoded ibmcloud.pkr.hcl generated by deploy.sh
      default: ""
    - name: packer-key-b64
      description: Base64-encoded SSH private key for packer VPC SSH auth
      default: ""
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: log-message-run-
      spec:
        pipelineRef:
          name: log-message-pipeline
        params:
          - name: message
            value: $(tt.params.message)
          - name: image-name
            value: $(tt.params.image-name)
          - name: cos-bucket
            value: $(tt.params.cos-bucket)
          - name: cos-region
            value: $(tt.params.cos-region)
          - name: ibmcloud-api-key
            value: $(tt.params.ibmcloud-api-key)
          - name: cos-instance-crn
            value: $(tt.params.cos-instance-crn)
          - name: ibmcloud-api-endpoint
            value: $(tt.params.ibmcloud-api-endpoint)
          - name: cos-api-endpoint
            value: $(tt.params.cos-api-endpoint)
          - name: packer-hcl-b64
            value: $(tt.params.packer-hcl-b64)
          - name: packer-key-b64
            value: $(tt.params.packer-key-b64)
---
# The EventListener is the named entry-point that IBM Cloud registers
# as the "generic webhook" trigger endpoint inside the Tekton pipeline service.
apiVersion: tekton.dev/v1beta1
kind: EventListener
metadata:
  name: log-message-listener
spec:
  triggers:
    - name: webhook-trigger
      bindings:
        - ref: log-message-binding
      template:
        ref: log-message-template
