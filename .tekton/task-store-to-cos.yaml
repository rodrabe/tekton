apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: store-to-cos
spec:
  params:
    - name: message
      type: string
      description: The original message string from task 1
    - name: character-count
      type: string
      description: Character count from task 1
    - name: image-name
      type: string
      description: Packer image name from task 1
    - name: cos-bucket
      type: string
      description: COS bucket name to write the summary file to
    - name: cos-region
      type: string
      description: COS region (e.g. us-south)
      default: "us-south"
    - name: ibmcloud-api-key
      type: string
      description: IBM Cloud API key (SECURE — do not log)
    - name: cos-instance-crn
      type: string
      description: CRN of the COS service instance
      default: ""
    - name: ibmcloud-api-endpoint
      type: string
      description: IBM Cloud API endpoint (use https://test.cloud.ibm.com for staging)
      default: "https://cloud.ibm.com"
    - name: cos-api-endpoint
      type: string
      description: COS service endpoint (leave empty for production; set for staging)
      default: ""
  steps:
    - name: upload
      image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.12
      env:
        - name: STEP_API_KEY
          value: $(params.ibmcloud-api-key)
        - name: STEP_BUCKET
          value: $(params.cos-bucket)
        - name: STEP_REGION
          value: $(params.cos-region)
        - name: STEP_API_ENDPOINT
          value: $(params.ibmcloud-api-endpoint)
        - name: STEP_COS_ENDPOINT
          value: $(params.cos-api-endpoint)
        - name: STEP_COS_CRN
          value: $(params.cos-instance-crn)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        MSG="$(params.message)"
        COUNT="$(params.character-count)"
        IMAGE="$(params.image-name)"
        TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        OBJECT_KEY="pipeline-runs/${TIMESTAMP}-summary.json"

        # Build JSON summary
        PAYLOAD=$(printf '{"timestamp":"%s","message":"%s","character_count":%s,"image_name":"%s"}' \
          "${TIMESTAMP}" "${MSG}" "${COUNT}" "${IMAGE}")

        echo "==> Summary:"
        echo "${PAYLOAD}" | tr ',' '\n'

        # Write to a temp file (ibmcloud cos object-put reads from file)
        printf '%s' "${PAYLOAD}" > /tmp/summary.json

        echo "==> Logging in to IBM Cloud (${STEP_API_ENDPOINT})..."
        ibmcloud login --apikey "${STEP_API_KEY}" -r "${STEP_REGION}" \
          -a "${STEP_API_ENDPOINT}" -q

        echo "==> Installing COS plugin..."
        ibmcloud plugin install cloud-object-storage -f -q

        # Configure COS instance CRN so the plugin knows which instance to use
        if [[ -n "${STEP_COS_CRN}" ]]; then
          echo "==> Configuring COS instance CRN..."
          ibmcloud cos config crn --crn "${STEP_COS_CRN}"
        fi

        # Point the COS plugin at the correct service endpoint when using staging
        if [[ -n "${STEP_COS_ENDPOINT}" ]]; then
          echo "==> Configuring COS endpoint: ${STEP_COS_ENDPOINT}"
          ibmcloud cos config endpoint-url --url "${STEP_COS_ENDPOINT}"
        fi

        echo "==> Uploading to s3://${STEP_BUCKET}/${OBJECT_KEY} ..."
        ibmcloud cos object-put \
          --bucket "${STEP_BUCKET}" \
          --key    "${OBJECT_KEY}" \
          --body   /tmp/summary.json \
          --content-type "application/json"

        echo "==> Stored: s3://${STEP_BUCKET}/${OBJECT_KEY}"
