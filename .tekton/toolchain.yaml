# IBM Cloud Continuous Delivery Toolchain definition
# https://cloud.ibm.com/docs/ContinuousDelivery?topic=ContinuousDelivery-toolchains_about
version: "2"
template:
  name: log-message-toolchain
  description: >
    A Tekton pipeline that logs a string parameter delivered via a webhook trigger.

services:
  # --- Source repo -------------------------------------------------------
  repo:
    service_id: githubconsolidated       # or hostedgit / bitbucketgit
    parameters:
      repo_url: $(env.REPO_URL)           # set before apply, e.g. export REPO_URL=...
      type: existing

  # --- Tekton pipeline ---------------------------------------------------
  pipeline:
    service_id: pipeline
    parameters:
      type: tekton
      name: log-message-pipeline
      ui_pipeline: true
      configuration:
        content:
          $text: tekton-pipeline.yaml     # references the file in .tekton/ in this repo
        env:
          REPO: repo
        execute: false

      triggers:
        - type: generic                   # "generic" = webhook in IBM Cloud Tekton
          name: webhook-trigger
          event_listener: log-message-listener
          # The webhook URL is auto-generated by IBM Cloud after the toolchain is created.
          # Retrieve it with:
          #   ibmcloud dev tekton-pipeline trigger-url \
          #     --pipeline-id $PIPELINE_ID --trigger-name webhook-trigger
