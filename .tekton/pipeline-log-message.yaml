apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: log-message-pipeline
spec:
  params:
    - name: message
      type: string
      description: The string message to log
    - name: image-name
      type: string
      description: Packer image name (with timestamp) passed from deploy.sh
      default: ""
    - name: cos-bucket
      type: string
      description: COS bucket to store the run summary
      default: ""
    - name: cos-region
      type: string
      description: COS region (e.g. us-south)
      default: "us-south"
    - name: ibmcloud-api-key
      type: string
      description: IBM Cloud API key for COS upload (SECURE)
      default: ""
    - name: cos-instance-crn
      type: string
      description: CRN of the COS service instance
      default: ""
    - name: ibmcloud-api-endpoint
      type: string
      description: IBM Cloud API endpoint (https://test.cloud.ibm.com for staging)
      default: "https://cloud.ibm.com"
    - name: cos-api-endpoint
      type: string
      description: COS service endpoint (empty for production; set for staging)
      default: ""
    - name: packer-hcl-b64
      type: string
      description: Base64-encoded ibmcloud.pkr.hcl generated by deploy.sh
      default: ""
    - name: packer-key-b64
      type: string
      description: Base64-encoded SSH private key for packer VPC SSH auth
      default: ""
  tasks:
    - name: log-message
      taskRef:
        name: log-message
      params:
        - name: message
          value: $(params.message)
        - name: image-name
          value: $(params.image-name)
        - name: packer-hcl-b64
          value: $(params.packer-hcl-b64)
        - name: packer-key-b64
          value: $(params.packer-key-b64)

    - name: store-to-cos
      runAfter: [log-message]
      taskRef:
        name: store-to-cos
      params:
        - name: message
          value: $(tasks.log-message.results.message)
        - name: character-count
          value: $(tasks.log-message.results.character-count)
        - name: image-name
          value: $(tasks.log-message.results.image-name)
        - name: cos-bucket
          value: $(params.cos-bucket)
        - name: cos-region
          value: $(params.cos-region)
        - name: ibmcloud-api-key
          value: $(params.ibmcloud-api-key)
        - name: cos-instance-crn
          value: $(params.cos-instance-crn)
        - name: ibmcloud-api-endpoint
          value: $(params.ibmcloud-api-endpoint)
        - name: cos-api-endpoint
          value: $(params.cos-api-endpoint)
