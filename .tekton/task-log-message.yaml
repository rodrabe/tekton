apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: log-message
spec:
  params:
    - name: message
      type: string
      description: The string message to count and log
    - name: packer-ibm-version
      type: string
      description: IBM Cloud Packer plugin version to install
      default: "3.6.0"
    - name: packer-hcl-b64
      type: string
      description: Base64-encoded ibmcloud.pkr.hcl content passed from deploy.sh
      default: ""
    - name: packer-key-b64
      type: string
      description: Base64-encoded SSH private key for packer VPC SSH auth
      default: ""
  steps:
    - name: count-and-log
      image: hashicorp/packer:1.15.4
      env:
        - name: STEP_PKR_HCL_B64
          value: $(params.packer-hcl-b64)
        - name: STEP_PKR_KEY_B64
          value: $(params.packer-key-b64)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        export PACKER_LOG=1
        export PACKER_LOG_PATH=/dev/stdout

        packer version
        packer plugins install github.com/IBM/ibmcloud 3.6.0
        packer plugins installed

        # Decode SSH private key
        echo "==> Writing SSH private key..."
        printf '%s' "${STEP_PKR_KEY_B64}" | base64 -d > /workspace/packer_id_rsa
        chmod 600 /workspace/packer_id_rsa

        # Decode and write the generated HCL file
        echo "==> Writing ibmcloud.pkr.hcl..."
        printf '%s' "${STEP_PKR_HCL_B64}" | base64 -d > /workspace/ibmcloud.pkr.hcl
        echo "--- ibmcloud.pkr.hcl ---"
        cat /workspace/ibmcloud.pkr.hcl
        echo "------------------------"
        packer validate /workspace/ibmcloud.pkr.hcl

        packer build /workspace/ibmcloud.pkr.hcl

        MSG="$(params.message)"
        COUNT=$(printf '%s' "${MSG}" | wc -m | tr -d ' ')
        echo "Message: ${MSG}"
        echo "Character count: ${COUNT}"
