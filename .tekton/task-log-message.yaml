apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: log-message
spec:
  params:
    - name: message
      type: string
      description: The string message to count and log
  steps:
    - name: count-and-log
      image: stg.icr.io/rodrabe/packer:latest
      script: |
        #!/bin/sh
        packer version
        echo "Waiting 60 seconds before counting..."
        sleep 60
        MSG="$(params.message)"
        COUNT=$(printf '%s' "${MSG}" | wc -m | tr -d ' ')
        echo "Message: ${MSG}"
        echo "Character count: ${COUNT}"
