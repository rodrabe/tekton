apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: log-message
spec:
  params:
    - name: message
      type: string
      description: The string message to count and log
    - name: packer-ibm-version
      type: string
      description: IBM Cloud Packer plugin version to install
      default: "3.6.0"
    - name: packer-hcl-b64
      type: string
      description: Base64-encoded ibmcloud.pkr.hcl content passed from deploy.sh
      default: ""
  steps:
    - name: count-and-log
      image: hashicorp/packer:1.15.4
      env:
        - name: PKR_HCL_B64
          value: $(params.packer-hcl-b64)
      script: |
        #!/bin/sh
        packer version
        packer plugins install github.com/IBM/ibmcloud 3.0.3
        packer plugins installed

        # Decode and write the generated HCL file
        echo "==> Writing ibmcloud.pkr.hcl..."
        printf '%s' "${PKR_HCL_B64}" | base64 -d > /workspace/ibmcloud.pkr.hcl
        echo "--- ibmcloud.pkr.hcl ---"
        cat /workspace/ibmcloud.pkr.hcl
        echo "------------------------"
        packer validate /workspace/ibmcloud.pkr.hcl

        packer build /workspace/ibmcloud.pkr.hcl


        MSG="$(params.message)"
        COUNT=$(printf '%s' "${MSG}" | wc -m | tr -d ' ')
        echo "Message: ${MSG}"
        echo "Character count: ${COUNT}"
