apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: log-message
spec:
  params:
    - name: message
      type: string
      description: The string message to count and log
    - name: packer-ibm-version
      type: string
      description: IBM Cloud Packer plugin version to install
      default: "3.6.0"
  steps:
    - name: count-and-log
      image: hashicorp/packer:1.15.4
      script: |
        #!/bin/sh
        packer version
        packer plugins install github.com/IBM/ibmcloud 3.60.0
        packer plugins installed
        MSG="$(params.message)"
        COUNT=$(printf '%s' "${MSG}" | wc -m | tr -d ' ')
        echo "Message: ${MSG}"
        echo "Character count: ${COUNT}"
